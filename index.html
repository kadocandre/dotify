<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot·ify - Dot Art Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --text-muted: #666;
    --dot-preview: #e8ff47;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 2.5rem 3rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo span.accent { color: var(--accent); }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  .tagline {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* CONTROLS PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .panel-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-header::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .panel-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--bg);
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232, 255, 71, 0.03);
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 48px; height: 48px;
    margin: 0 auto 1rem;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .upload-zone:hover .upload-icon {
    border-color: var(--accent);
    color: var(--accent);
  }

  .upload-text {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .upload-text strong { color: var(--text); display: block; margin-bottom: 0.25rem; font-size: 0.85rem; }

  /* PREVIEW THUMB */
  .thumb-wrap {
    display: none;
    position: relative;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    background: repeating-conic-gradient(#1e1e1e 0% 25%, #161616 0% 50%) 0 0 / 16px 16px;
  }

  .thumb-wrap img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    display: block;
  }

  .thumb-replace {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .thumb-replace:hover { color: var(--accent); border-color: var(--accent); }

  /* CONTROLS */
  .control-group { display: flex; flex-direction: column; gap: 0.6rem; }

  .control-label {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .control-value {
    color: var(--accent);
    font-size: 0.72rem;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 0;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }

  input[type=range]::-webkit-slider-runnable-track {
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 0%), var(--border) var(--pct, 0%));
    height: 2px;
  }

  /* COLOR PICKER */
  .color-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--text); transform: scale(1.1); }

  .color-custom {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px dashed var(--border);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .color-custom input[type=color] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    opacity: 0;
    cursor: pointer;
  }

  .color-custom-bg {
    position: absolute;
    inset: 0;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    opacity: 0.7;
    border-radius: 50%;
  }

  /* SHAPE TOGGLE */
  .shape-row { display: flex; gap: 0.5rem; }

  .shape-btn {
    flex: 1;
    padding: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .shape-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .shape-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }

  /* GENERATE BTN */
  .btn-generate {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,255,71,0.25); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* OUTPUT PANEL */
  .output-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    min-height: 500px;
    display: flex;
    flex-direction: column;
  }

  .output-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-header-right { display: flex; gap: 0.5rem; align-items: center; }

  .output-header-left { display: flex; align-items: center; gap: 0.5rem; }
  .output-header-left::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .btn-download {
    padding: 0.35rem 0.8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  .btn-download:hover { border-color: var(--accent); color: var(--accent); }

  .output-canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: repeating-conic-gradient(#1a1a1a 0% 25%, #161616 0% 50%) 0 0 / 20px 20px;
    position: relative;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
  }

  .empty-dots {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    width: 80px;
    margin: 0 auto 1.2rem;
    opacity: 0.3;
  }

  .empty-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: fadeIn 1s ease-in-out infinite alternate;
  }

  .empty-dot:nth-child(odd) { animation-delay: 0.3s; }
  .empty-dot:nth-child(3n) { animation-delay: 0.6s; }

  @keyframes fadeIn {
    from { opacity: 0.2; }
    to { opacity: 1; }
  }

  .empty-state p { font-size: 0.75rem; line-height: 1.7; }

  #outputCanvas { max-width: 100%; max-height: 520px; display: none; image-rendering: pixelated; }

  /* Loading */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(14,14,14,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    z-index: 5;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
  }

  .loading-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 0.9s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.15s; }
  .loading-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
  }

  .loading-text {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  canvas#hiddenCanvas { display: none; }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
    header { padding: 1.5rem; }
    .panel-body, main { padding: 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Dot<span class="accent">·</span>ify
  </div>
  <div class="tagline">Dot Art Style Generator</div>
</header>

<main>
  <!-- CONTROLS -->
  <div class="panel">
    <div class="panel-header">Controls</div>
    <div class="panel-body">

      <!-- Upload -->
      <div>
        <div class="control-label" style="margin-bottom:0.6rem;">Image Input</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*">
          <div class="upload-icon">⬆</div>
          <div class="upload-text">
            <strong>Drop image here</strong>
            or click to browse · PNG, JPG, WEBP
          </div>
        </div>
        <div class="thumb-wrap" id="thumbWrap">
          <img id="thumbImg" src="" alt="preview">
          <button class="thumb-replace" id="thumbReplace">REPLACE</button>
        </div>
      </div>

      <!-- Dot Size -->
      <div class="control-group">
        <div class="control-label">
          Dot Size
          <span class="control-value" id="dotSizeVal">4px</span>
        </div>
        <input type="range" id="dotSize" min="2" max="16" value="4" step="1">
      </div>

      <!-- Dot Spacing -->
      <div class="control-group">
        <div class="control-label">
          Spacing
          <span class="control-value" id="spacingVal">6px</span>
        </div>
        <input type="range" id="spacing" min="2" max="20" value="6" step="1">
      </div>

      <!-- Threshold -->
      <div class="control-group">
        <div class="control-label">
          Darkness Threshold
          <span class="control-value" id="thresholdVal">128</span>
        </div>
        <input type="range" id="threshold" min="30" max="240" value="128" step="1">
      </div>

      <!-- Dot Shape -->
      <div class="control-group">
        <div class="control-label">Dot Shape</div>
        <div class="shape-row">
          <button class="shape-btn active" data-shape="circle">● Circle</button>
          <button class="shape-btn" data-shape="square">■ Square</button>
          <button class="shape-btn" data-shape="diamond">◆ Diamond</button>
        </div>
      </div>

      <!-- Dot Color -->
      <div class="control-group">
        <div class="control-label">Dot Color</div>
        <div class="color-row" id="colorRow">
          <div class="color-swatch active" data-color="#e8ff47" style="background:#e8ff47" title="Lime"></div>
          <div class="color-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></div>
          <div class="color-swatch" data-color="#ff6b35" style="background:#ff6b35" title="Orange"></div>
          <div class="color-swatch" data-color="#00d4ff" style="background:#00d4ff" title="Cyan"></div>
          <div class="color-swatch" data-color="#ff3b7a" style="background:#ff3b7a" title="Pink"></div>
          <div class="color-swatch" data-color="#000000" style="background:#000000;border-color:#333" title="Black"></div>
          <div class="color-custom" title="Custom color">
            <div class="color-custom-bg"></div>
            <input type="color" id="customColor" value="#e8ff47">
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-panel">
    <div class="output-header">
      <div class="output-header-left">Output</div>
      <div class="output-header-right">
        <button class="btn-download" id="downloadBtn">↓ Download PNG</button>
        <button class="btn-download" id="copyBtn">⧉ Copy PNG</button>
      </div>
    </div>
    <div class="output-canvas-wrap" id="canvasWrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-dots">
          <div class="empty-dot"></div><div class="empty-dot"></div><div class="empty-dot"></div>
          <div class="empty-dot"></div><div class="empty-dot"></div><div class="empty-dot"></div>
          <div class="empty-dot"></div><div class="empty-dot"></div><div class="empty-dot"></div>
          <div class="empty-dot"></div><div class="empty-dot"></div><div class="empty-dot"></div>
        </div>
        <p>Upload an image to see<br>the live dot art preview.</p>
      </div>
      <canvas id="outputCanvas"></canvas>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
        <div class="loading-text">Stippling pixels...</div>
      </div>
    </div>
  </div>
</main>

<canvas id="hiddenCanvas"></canvas>

<script>
const fileInput     = document.getElementById('fileInput');
const uploadZone    = document.getElementById('uploadZone');
const thumbWrap     = document.getElementById('thumbWrap');
const thumbImg      = document.getElementById('thumbImg');
const thumbReplace  = document.getElementById('thumbReplace');
const downloadBtn   = document.getElementById('downloadBtn');
const copyBtn       = document.getElementById('copyBtn');
const outputCanvas  = document.getElementById('outputCanvas');
const hiddenCanvas  = document.getElementById('hiddenCanvas');
const emptyState    = document.getElementById('emptyState');
const loadingOverlay = document.getElementById('loadingOverlay');

const dotSizeSlider  = document.getElementById('dotSize');
const spacingSlider  = document.getElementById('spacing');
const thresholdSlider = document.getElementById('threshold');
const dotSizeVal     = document.getElementById('dotSizeVal');
const spacingVal     = document.getElementById('spacingVal');
const thresholdVal   = document.getElementById('thresholdVal');
const customColorInput = document.getElementById('customColor');

let currentImage  = null;
let selectedColor = '#e8ff47';
let selectedShape = 'circle';
let debounceTimer = null;
// Cache pixel data so we don't re-read the image on every slider move
let cachedPixels  = null;
let cachedW = 0, cachedH = 0;

// ── Range sliders ────────────────────────────────────────────────────────────
function updateRange(slider, display, suffix) {
  const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.setProperty('--pct', pct + '%');
  display.textContent = slider.value + suffix;
}

[dotSizeSlider, spacingSlider, thresholdSlider].forEach(s => {
  s.addEventListener('input', () => {
    updateRange(dotSizeSlider, dotSizeVal, 'px');
    updateRange(spacingSlider, spacingVal, 'px');
    updateRange(thresholdSlider, thresholdVal, '');
    scheduleRender();
  });
});

updateRange(dotSizeSlider, dotSizeVal, 'px');
updateRange(spacingSlider, spacingVal, 'px');
updateRange(thresholdSlider, thresholdVal, '');

// ── Color swatches ───────────────────────────────────────────────────────────
document.querySelectorAll('.color-swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    selectedColor = s.dataset.color;
    scheduleRender();
  });
});

customColorInput.addEventListener('input', () => {
  document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
  selectedColor = customColorInput.value;
  scheduleRender();
});

// ── Shape buttons ────────────────────────────────────────────────────────────
document.querySelectorAll('.shape-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    selectedShape = b.dataset.shape;
    scheduleRender();
  });
});

// ── Drag & drop / file input ─────────────────────────────────────────────────
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadImage(fileInput.files[0]); });
thumbReplace.addEventListener('click', () => fileInput.click());

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      thumbImg.src = e.target.result;
      thumbWrap.style.display = 'block';
      uploadZone.style.display = 'none';
      // Pre-cache pixel data at render resolution
      cachePixels();
      scheduleRender(0); // render immediately on load
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Pixel cache ──────────────────────────────────────────────────────────────
function cachePixels() {
  const maxW = 900, maxH = 900;
  let sw = currentImage.width, sh = currentImage.height;
  if (sw > maxW) { sh = Math.round(sh * maxW / sw); sw = maxW; }
  if (sh > maxH) { sw = Math.round(sw * maxH / sh); sh = maxH; }

  hiddenCanvas.width = sw;
  hiddenCanvas.height = sh;
  const hCtx = hiddenCanvas.getContext('2d');
  hCtx.drawImage(currentImage, 0, 0, sw, sh);
  cachedPixels = hCtx.getImageData(0, 0, sw, sh).data;
  cachedW = sw;
  cachedH = sh;
}

// ── Debounced render scheduler ───────────────────────────────────────────────
function scheduleRender(delay = 60) {
  if (!currentImage) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderDotArt, delay);
}

// ── Core render ──────────────────────────────────────────────────────────────
function renderDotArt() {
  if (!currentImage || !cachedPixels) return;

  // Show subtle spinner only for first render; after that it's fast enough
  loadingOverlay.style.display = 'flex';

  // Use requestAnimationFrame so the spinner actually paints before heavy work
  requestAnimationFrame(() => {
    const dotSize  = parseInt(dotSizeSlider.value);
    const spacing  = parseInt(spacingSlider.value);
    const threshold = parseInt(thresholdSlider.value);
    const step = dotSize + spacing;
    const half = dotSize / 2;

    outputCanvas.width  = cachedW;
    outputCanvas.height = cachedH;
    const ctx = outputCanvas.getContext('2d');
    ctx.clearRect(0, 0, cachedW, cachedH);
    ctx.fillStyle = selectedColor;

    for (let y = half; y < cachedH - half; y += step) {
      for (let x = half; x < cachedW - half; x += step) {
        const px = Math.floor(x), py = Math.floor(y);
        const i  = (py * cachedW + px) * 4;
        if (cachedPixels[i + 3] < 30) continue;

        const brightness = 0.299 * cachedPixels[i] + 0.587 * cachedPixels[i+1] + 0.114 * cachedPixels[i+2];
        if (brightness > threshold) continue;

        const darkness = 1 - brightness / threshold;
        const r2 = half * (0.4 + 0.6 * darkness);

        ctx.beginPath();
        if (selectedShape === 'circle') {
          ctx.arc(x, y, r2, 0, Math.PI * 2);
        } else if (selectedShape === 'square') {
          ctx.rect(x - r2, y - r2, r2 * 2, r2 * 2);
        } else if (selectedShape === 'diamond') {
          ctx.moveTo(x, y - r2);
          ctx.lineTo(x + r2, y);
          ctx.lineTo(x, y + r2);
          ctx.lineTo(x - r2, y);
          ctx.closePath();
        }
        ctx.fill();
      }
    }

    loadingOverlay.style.display = 'none';
    emptyState.style.display     = 'none';
    outputCanvas.style.display   = 'block';
    downloadBtn.style.display    = 'inline-block';
    copyBtn.style.display        = 'inline-block';
  });
}

// ── Copy to clipboard ─────────────────────────────────────────────────────────
copyBtn.addEventListener('click', async () => {
  try {
    const blob = await new Promise(res => outputCanvas.toBlob(res, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    const orig = copyBtn.textContent;
    copyBtn.textContent = '✓ Copied!';
    copyBtn.style.borderColor = 'var(--accent)';
    copyBtn.style.color = 'var(--accent)';
    setTimeout(() => {
      copyBtn.textContent = orig;
      copyBtn.style.borderColor = '';
      copyBtn.style.color = '';
    }, 1800);
  } catch (e) {
    copyBtn.textContent = '✗ Failed';
    setTimeout(() => { copyBtn.textContent = '⧉ Copy PNG'; }, 1800);
  }
});
downloadBtn.addEventListener('click', async () => {
  const blob = await new Promise(resolve =>
    outputCanvas.toBlob(resolve, 'image/png')
  );
  
if (navigator.canShare?.({ files: [file] })) {
  const file = new File([blob], 'dotify-art.png', {
    type: 'image/png'
  });

    await navigator.share({
      files: [file],
      title: 'Dotify Art'
    });
    return;
} 
  
    // fallback desktop
    const link = document.createElement('a');
    link.download = 'dotify-art.png';
    link.href = URL.createObjectURL(blob);
    link.click();
  }
});
</script>
